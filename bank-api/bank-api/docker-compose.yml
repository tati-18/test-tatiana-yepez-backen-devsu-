version: '3.8'

services:

  postgres:
    image: postgres:16

    container_name: postgres_bank

    restart: always

    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: bank_api

    restart: always

    ports:
      - "8081:8081"

    depends_on:
      - postgres

volumes:
  postgres_data: